# Team / enterprise overrides for _bmad/config.toml.
# Committed to the repo — applies to every developer on the project.
# Tables deep-merge over base config; keyed entries merge by key.
# Example: override an agent descriptor, or add a new agent.
#
# [agents.bmad-agent-pm]
# description = "Prefers short, bulleted PRDs over narrative drafts."

# Durable rename override: the project is "Verticopolis" (formerly the working
# title "Tower Tycoon"). The installer-managed _bmad/config.toml,
# _bmad/core/config.yaml and _bmad/bmm/config.yaml still carry the old name and
# are regenerated on install, so pin the real name here (custom deep-merges over
# the base config; never hand-edit the generated files).
[core]
project_name = "Verticopolis"

# Verticopolis is a BROWSER game (TypeScript + Excalibur.js), not a
# Unity/Unreal/Godot project. Pin the game-dev module's platform so the gds
# agents don't assume an engine editor / C#/C++/GDScript workflow. (The
# installer default is '["unity", "unreal", "godot", "other"]'.)
[modules.gds]
primary_platform = "web"
