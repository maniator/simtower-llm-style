<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TowerSim (SimTower-inspired)</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="ui">
    <div class="topbar">
      <div class="brand">TowerSim</div>

      <div class="stats">
        <div><span class="label">Money</span> <span id="money">$0</span></div>
        <div><span class="label">Pop</span> <span id="pop">0</span></div>
        <div><span class="label">Happiness</span> <span id="happy">0</span></div>
        <div><span class="label">Stars</span> <span id="stars">★</span></div>
        <div><span class="label">Time</span> <span id="time">00:00</span></div>
      </div>

      <div class="controls">
        <button id="pauseBtn" title="Pause">⏸</button>
        <button id="playBtn" title="Play">▶</button>
        <button id="fastBtn" title="Fast">⏩</button>
      </div>
    </div>

    <div class="sidebar">
      <div class="panel">
        <div class="panelTitle">Build</div>
        <div id="buildList" class="buildList"></div>
        <div class="hint">
          Left click: place · Right click/ESC: cancel · Drag: pan · Wheel: zoom
        </div>
      </div>

      <div class="panel">
        <div class="panelTitle">Selection</div>
        <div id="info" class="info">
          Click a room or elevator shaft.
        </div>
      </div>

      <div class="panel">
        <div class="panelTitle">Elevators</div>
        <div id="elevPanel" class="info">
          No shaft selected.
        </div>
      </div>

      <div class="panel">
        <div class="panelTitle">Messages</div>
        <div id="log" class="log"></div>
      </div>
    </div>
  </div>

  <canvas id="game"></canvas>

  <script type="module" src="main.js"></script>
</body>
</html>
