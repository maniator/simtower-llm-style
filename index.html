<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SimTower LLM Style</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        font-family: "Trebuchet MS", "Lucida Sans", "Lucida Grande", Arial, sans-serif;
        margin: 0;
        padding: 32px 24px;
        background: #f4f2ed;
        color: #1f1b16;
      }
      h1 {
        margin: 0 0 12px 0;
        font-size: 28px;
        letter-spacing: 0.5px;
      }
      p {
        margin: 0 0 24px 0;
        color: #5c5146;
      }
      .links {
        display: grid;
        gap: 12px;
        max-width: 420px;
      }
      a {
        display: block;
        padding: 12px 16px;
        background: #ffffff;
        border: 2px solid #1f1b16;
        text-decoration: none;
        color: #1f1b16;
        font-weight: 600;
        letter-spacing: 0.4px;
        transition: transform 120ms ease, box-shadow 120ms ease;
      }
      a:hover,
      a:focus {
        transform: translateY(-2px);
        box-shadow: 0 6px 0 #1f1b16;
      }
    </style>
  </head>
  <body>
    <h1>SimTower LLM Style</h1>
    <p>Select a build to explore.</p>
    <div class="links">
      <a href="chatgpt/">ChatGPT</a>
      <a href="copilot/">Copilot</a>
      <a href="github-copilot/">GitHub Copilot</a>
      <a href="gemini/">Gemini</a>
    </div>
  </body>
</html>
