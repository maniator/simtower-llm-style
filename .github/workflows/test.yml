name: Test CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: "github-copilot/package-lock.json"

      - name: Install dependencies
        working-directory: ./github-copilot
        run: npm ci

      - name: Lint
        working-directory: ./github-copilot
        run: npm run lint

      - name: Typecheck
        working-directory: ./github-copilot
        run: npm run typecheck

      - name: Run tests
        working-directory: ./github-copilot
        run: npm run test:coverage -- --run

      - name: Build
        working-directory: ./github-copilot
        run: npm run build
