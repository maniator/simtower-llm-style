name: Test CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# CI runs lint/typecheck/tests/build only — it never takes screenshots, so skip
# downloading Playwright browsers during `npm ci`.
env:
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js (from .nvmrc)
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm run test:coverage -- --run

      - name: Build
        run: npm run build

  # Tier-2 end-to-end smoke: drive the BUILT app in a real browser and prove the
  # TOWER win surfaces to the player (the congratulations modal). Kept in its own
  # job so its browser download never slows the fast lint/typecheck/test lane.
  e2e:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js (from .nvmrc)
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      - name: Run end-to-end tests
        run: npm run e2e

      # Per-run visual proof of the ★-progression (the committed gallery in
      # docs/screenshots/milestones/ is the human-blessed baseline).
      - name: Upload milestone screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: milestone-screenshots
          path: docs/screenshots/milestones/
          if-no-files-found: warn
