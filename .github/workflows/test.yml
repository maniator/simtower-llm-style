name: Test CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# CI runs lint/typecheck/tests/build only — it never takes screenshots, so skip
# downloading Playwright browsers during `npm ci`.
env:
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm run test:coverage -- --run

      - name: Build
        run: npm run build
