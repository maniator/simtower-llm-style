<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenTower - HTML5 Tower Sim</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="ui-container">
      <header>
        <div class="stat-box">
          <span class="label">FUNDS</span>
          <span id="ui-funds">$0</span>
        </div>
        <div class="stat-box">
          <span class="label">POP</span>
          <span id="ui-pop">0</span>
        </div>
        <div class="stat-box">
          <span class="label">RATING</span>
          <span id="ui-stars">★☆☆☆☆</span>
        </div>
        <div class="stat-box">
          <span class="label">DATE</span>
          <span id="ui-time">Day 1 - 8:00 AM</span>
        </div>
        <div class="controls">
          <button id="btn-pause">❚❚</button>
          <button id="btn-play">▶</button>
          <button id="btn-fast">▶▶</button>
        </div>
      </header>

      <div id="game-wrapper">
        <canvas id="game-canvas"></canvas>

        <aside id="toolbar">
          <div class="tool-category">Structure</div>
          <button class="tool-btn selected" data-type="lobby" data-cost="2000">
            Lobby ($2k)
          </button>
          <button class="tool-btn" data-type="stairs" data-cost="500">
            Stairs ($500)
          </button>
          <button class="tool-btn" data-type="elevator" data-cost="20000">
            Elevator ($20k)
          </button>
          <button class="tool-btn" data-type="floor" data-cost="500">
            Floor/Wall ($500)
          </button>

          <div class="tool-category">Residential</div>
          <button class="tool-btn" data-type="condo" data-cost="8000">
            Condo ($8k)
          </button>

          <div class="tool-category">Commercial</div>
          <button class="tool-btn" data-type="office" data-cost="4000">
            Office ($4k)
          </button>
          <button class="tool-btn" data-type="food" data-cost="10000">
            Fast Food ($10k)
          </button>

          <div class="tool-category">Hotel</div>
          <button class="tool-btn" data-type="hotel" data-cost="5000">
            Single Room ($5k)
          </button>

          <div class="tool-category">Service</div>
          <button class="tool-btn" data-type="housekeeping" data-cost="15000">
            Housekeeping ($15k)
          </button>
        </aside>
      </div>

      <div id="status-bar">Tool: Select a room to build...</div>
    </div>

    <script type="module" src="main.js"></script>
  </body>
</html>
