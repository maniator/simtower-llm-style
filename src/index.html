<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tower Tycoon — a SimTower clone</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="app">
      <header id="topbar">
        <div class="brand">🏢 <span>TOWER TYCOON</span></div>
        <div id="status">
          <div class="stat" title="Cash on hand">
            <span class="label">FUNDS</span>
            <span id="stat-money" class="value money">$2,000,000</span>
          </div>
          <div class="stat" title="Total population">
            <span class="label">POP</span>
            <span id="stat-pop" class="value">0</span>
          </div>
          <div class="stat" title="Star rating">
            <span class="label">RATING</span>
            <span id="stat-star" class="value stars">★</span>
          </div>
          <div class="stat" title="Date & time">
            <span class="label">TIME</span>
            <span id="stat-time" class="value">Mon 07:00</span>
          </div>
        </div>
        <div id="speed">
          <button data-speed="0" title="Pause">⏸</button>
          <button data-speed="1" class="active" title="Slow">▶</button>
          <button data-speed="2" title="Medium">▶▶</button>
          <button data-speed="3" title="Fast">▶▶▶</button>
          <button id="audio-toggle" title="Toggle sound">🔊</button>
          <button id="panel-toggle" title="Show/hide panels">☰</button>
        </div>
      </header>

      <main id="main">
        <aside id="palette">
          <div class="palette-scroll" id="palette-scroll"></div>
        </aside>

        <section id="stage">
          <canvas id="view"></canvas>
          <div id="hint">Drag to pan · Scroll to zoom · Click to build · Inspect tool to edit a room</div>
          <div id="inspector" class="hidden"></div>
          <div id="editor" class="hidden"></div>
          <div id="toast-wrap"></div>
        </section>

        <aside id="sidebar">
          <button id="panel-close" class="panel-close" title="Close panels" aria-label="Close panels">✕</button>
          <div class="panel">
            <h3>Selected</h3>
            <div id="tool-info">Pick a facility from the left.</div>
          </div>
          <div class="panel">
            <h3>Tower</h3>
            <input id="tower-name" class="name-input" maxlength="28" />
            <div id="tower-stats"></div>
            <button id="btn-stats" class="wide-btn">📊 Full Statistics</button>
          </div>
          <div class="panel grow">
            <h3>Bulletin</h3>
            <div id="log"></div>
          </div>
          <div class="panel">
            <h3>Game</h3>
            <div class="btn-row">
              <button id="btn-save">Quick Save</button>
              <button id="btn-load">Saves…</button>
            </div>
            <div class="btn-row">
              <button id="btn-export">Export</button>
              <button id="btn-import">Import</button>
            </div>
            <div class="btn-row">
              <button id="btn-new">New Tower</button>
              <button id="btn-help">Help</button>
            </div>
          </div>
        </aside>
      </main>
      <div id="scrim" aria-hidden="true"></div>
    </div>

    <input id="import-file" type="file" accept="application/json,.json,.twr,.TWR" hidden />
    <dialog id="modal"></dialog>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
