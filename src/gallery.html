<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tower Tycoon — Sprite Gallery</title>
    <style>
      /* Retro (Win3.1 / SimTower) theme, matching the main app. */
      body {
        margin: 0;
        background: #008080; /* teal desktop */
        color: #000;
        font-family: "MS Sans Serif", "Tahoma", "Geneva", "Segoe UI", sans-serif;
        -webkit-font-smoothing: none;
      }
      header {
        margin: 8px;
        padding: 8px 12px;
        background: #c0c0c0; /* system gray */
        box-shadow:
          inset -1px -1px #000,
          inset 1px 1px #fff,
          inset -2px -2px #808080,
          inset 2px 2px #dfdfdf;
      }
      header h1 {
        margin: -8px -12px 8px;
        padding: 3px 8px;
        font-size: 14px;
        background: #000080; /* navy title bar */
        color: #fff;
      }
      header p {
        margin: 4px 0 0;
        font-size: 12px;
        color: #000;
      }
      #gallery {
        display: block;
        margin: 0 auto;
        image-rendering: pixelated;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>🏢 Tower Tycoon — Sprite Gallery</h1>
      <p>Every facility, transport and special state, drawn procedurally at game scale (evening lighting). Animated: elevators, cinema, metro.</p>
    </header>
    <canvas id="gallery"></canvas>
    <script type="module" src="./gallery.ts"></script>
  </body>
</html>
